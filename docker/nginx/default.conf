server {
    listen 80;
    server_name localhost;

    location / {
        # Route all traffic to the backend container
        # Docker's internal DNS automatically resolves "my-backend-api" to the right IP!
        proxy_pass http://fastapi:8000;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Optionally expose metrics endpoint directly
    location /TrhBVe_m5gg2002_E5VVqS {
        proxy_pass http://fastapi:8000/TrhBVe_m5gg2002_E5VVqS;
    }
}