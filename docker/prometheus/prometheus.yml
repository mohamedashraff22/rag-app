# configruations for prometheues
global: # global configurations.
  scrape_interval: 15s #  make a new metric every 15 (collect)
  evaluation_interval: 15s # evaluation

scrape_configs:

  - job_name: 'fastapi'
    static_configs:
      - targets: ['fastapi:8000']
    metrics_path: '/TrhBVe_m5gg2002_E5VVqS'

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'qdrant'
    static_configs:
      - targets: ['qdrant:6333']
    metrics_path: '/metrics' # from the qdrant doc

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187'] # it will give it all metrics it will need