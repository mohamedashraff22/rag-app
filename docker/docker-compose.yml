services:
  # FastAPI Application
  fastapi: # it is not a predefined image i will run as the other, it should be build firt.
    build:
      context: .. # return back folder
      dockerfile: docker/ragapp/Dockerfile
    platform: linux/amd64
    container_name: fastapi
    ports:
      - "8000:8000"
    volumes:
      - fastapi_data:/app/assets
    networks:
      - backend
    restart: always
    depends_on:
      pgvector:
        condition: service_healthy # its not only about up its about being working
    env_file:
      - ./env/.env.app

  # Nginx Service
  nginx:
    image: nginx:stable-alpine3.23-perl
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - fastapi
    networks:
      - backend
    restart: always


  # PostgreSQL (pgvector)
  pgvector:
    image: pgvector/pgvector:pg18-trixie # pgvector/pgvector -> repo on docker hub
    container_name: pgvector
    ports:
      - "5432:5432" # i can change the firset one (my local port), it runs by default on port 5432 and i ecpose it on 5432 too here. the second 5432 is the one in the container and i want to expose it for me in local on the first 5432 (i can change this).
    volumes: # where i will store the data it self (i can create more than one volume).
      - 'pgvector:/var/lib/postgresql' # location where the postgres save its data (from the container).
    env_file: # i can put them directly here but its better to put them in .env file as they might be sensetive.
      - ./env/.env.postgres
    networks:
      - backend # the network all services will talk on it.
    restart: always # restart when fail
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"] # open termianl and run this command "pg_isready -U postgres" to check if postgres works or not.
      interval: 5s # it will it every 5 sec
      timeout: 5s # it will wait 5 sec to get a working response from postgres
      retries: 5 # it will try to do it for 5 times if for 5 times it fail it will acknowledge that postgres is down.
      start_period: 10s # wait for 10s in start of app and then start doing your healthcheck.

  # Qdrant (VectorDB)
  qdrant:
    image: qdrant/qdrant:v1.17.0
    container_name: qdrant
    ports:
      - "6333:6333" # for http service 
      - "6334:6334" # for grpc
    volumes:
      - qdrant_data:/qdrant/storage # /qdrant/storage is inside the container it self and i wll map it on volume called "qdrant_data", it aslo have bulit in metrics work with prometheus runs on http:localhost:6333/metrics (from documentation)
    networks:
      - backend
    restart: always

  # Prometheus Monitoring (for collecting teh metrics from all the services)
  prometheus:
    image: prom/prometheus:v3.10.0
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - prometheus_data:/prometheus # this will keep the data in a volume in docker.
      # - ./prom_data://prometheus -> this will make a real directory on my disk that will have the data inside it not in a volume (we may face some permessions problems)
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml # overrite the default configurations it have with the one i have created.
    networks:
      - backend
    restart: always
    command: # extra configurations for premethues run.
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle' # when i make changes while it works, it will automatically reload.

  # Grafana Dashboard
  grafana: # visualizing and alerting tool
    image: grafana/grafana:12.3-ubuntu
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    env_file:
      - ./env/.env.grafana
    depends_on:
      - prometheus
    networks:
      - backend
    restart: always


  # Node Exporter for system metrics
  node-exporter:  # metrics on the server we are working on.
    image: prom/node-exporter:v1.10.2
    container_name: node-exporter
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro # process
      - /sys:/host/sys:ro # system
      - /:/rootfs:ro # root , ro -> read only
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)' # remove system paths for more readability.
      # Add these lines to silence the WSL errors:
      - '--no-collector.netstat'
      - '--no-collector.softnet'
    networks:
      - backend
    restart: always

  # PostgreSQL Exporter for Postgres metrics (on demand to connect to postgress and get some analytics from it).
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.19.1
    container_name: postgres-exporter
    ports:
      - "9187:9187"
    env_file:
      - ./env/.env.postgres-exporter
    depends_on: # only work if pgvector service work.
      - pgvector
    networks:
      - backend
    restart: always

networks:
  backend:
  # for communication
    driver: bridge

volumes:
  fastapi_data:
  pgvector:
  qdrant_data:
  prometheus_data:
  grafana_data: